<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AM Golf — Demo Store</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,500;0,9..144,600;1,9..144,400&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --navy:#16233F; --navy-deep:#0D1526; --gold:#E8A33D; --coral:#E8735A;
    --cream:#F7F2E9; --ink:#14213D; --line:rgba(20,33,61,0.12);
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  body{font-family:'Inter',sans-serif;background:var(--cream);color:var(--ink);-webkit-font-smoothing:antialiased;}
  h1,h2,h3{font-family:'Fraunces',serif;font-weight:500;letter-spacing:-0.01em;}
  a{color:inherit;text-decoration:none;}
  button{font-family:inherit;cursor:pointer;border:none;background:none;}
  .wrap{max-width:1100px;margin:0 auto;padding:0 28px;}

  .announce{background:var(--navy-deep);color:var(--cream);text-align:center;font-size:12px;letter-spacing:.04em;padding:8px;}
  header{background:var(--cream);border-bottom:1px solid var(--line);position:sticky;top:0;z-index:40;}
  .navbar{display:flex;align-items:center;justify-content:space-between;padding:16px 28px;max-width:1100px;margin:0 auto;}
  .logo{font-family:'Fraunces',serif;font-size:21px;font-weight:600;}
  .logo span{color:var(--gold);}
  .cart-btn{position:relative;font-size:14px;font-weight:600;padding:9px 16px;border:1.5px solid var(--ink);border-radius:2px;}
  .cart-count{position:absolute;top:-8px;right:-8px;background:var(--coral);color:#fff;font-size:11px;width:19px;height:19px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:600;}

  .hero{padding:52px 0 34px;text-align:center;}
  .hero h1{font-size:clamp(30px,4.5vw,44px);margin-bottom:10px;}
  .hero p{color:#5B6478;font-size:15px;}

  .grid{display:grid;grid-template-columns:repeat(4,1fr);gap:22px;padding:20px 0 60px;}
  .card{cursor:pointer;background:none;text-align:left;width:100%;}
  .swatch{aspect-ratio:4/5;border-radius:3px;margin-bottom:12px;position:relative;overflow:hidden;display:flex;align-items:center;justify-content:center;color:rgba(247,242,233,.9);font-family:'Fraunces',serif;font-size:13px;transition:transform .2s ease;}
  .card:hover .swatch{transform:scale(1.02);}
  .p1{background:linear-gradient(160deg,#E8A33D,#C97B22);}
  .p2{background:linear-gradient(160deg,#6E7A93,#3B4763);}
  .p3{background:linear-gradient(160deg,#9BB7A4,#4E6B5A);}
  .p4{background:linear-gradient(160deg,#16233F,#0D1526);}
  .p5{background:linear-gradient(160deg,#E8735A,#B94A34);}
  .p6{background:linear-gradient(160deg,#D8CBB0,#A99C7E);}
  .p7{background:linear-gradient(160deg,#7A8FA6,#40506B);}
  .p8{background:linear-gradient(160deg,#C9A15F,#8C6A34);}
  .pname{font-size:14px;font-weight:600;margin-bottom:2px;}
  .pprice{font-size:13px;color:#5B6478;}

  .overlay{position:fixed;inset:0;background:rgba(13,21,38,0.45);display:none;z-index:100;}
  .overlay.open{display:block;}

  .drawer{position:fixed;top:0;right:-420px;width:400px;max-width:90vw;height:100%;background:var(--cream);z-index:101;transition:right .3s ease;display:flex;flex-direction:column;}
  .drawer.open{right:0;}
  .drawer-head{display:flex;justify-content:space-between;align-items:center;padding:22px 24px;border-bottom:1px solid var(--line);}
  .drawer-head h2{font-size:19px;}
  .close-btn{font-size:22px;line-height:1;color:#5B6478;}
  .drawer-items{flex:1;overflow-y:auto;padding:16px 24px;}
  .cart-row{display:flex;gap:14px;padding:16px 0;border-bottom:1px solid var(--line);align-items:center;}
  .cart-thumb{width:64px;height:76px;border-radius:2px;flex-shrink:0;}
  .cart-row-info{flex:1;}
  .cart-row-name{font-size:14px;font-weight:600;}
  .cart-row-meta{font-size:12px;color:#5B6478;margin-top:2px;}
  .qty-controls{display:flex;align-items:center;gap:10px;margin-top:8px;}
  .qty-btn{width:24px;height:24px;border:1px solid var(--line);border-radius:2px;font-size:14px;display:flex;align-items:center;justify-content:center;}
  .remove-btn{font-size:12px;color:var(--coral);text-decoration:underline;margin-top:8px;display:inline-block;}
  .cart-row-price{font-size:14px;font-weight:600;white-space:nowrap;}
  .empty-cart{text-align:center;padding:60px 20px;color:#5B6478;font-size:14px;}
  .drawer-foot{padding:22px 24px;border-top:1px solid var(--line);}
  .subtotal-row{display:flex;justify-content:space-between;font-size:15px;font-weight:600;margin-bottom:16px;}
  .checkout-btn{width:100%;background:var(--navy);color:var(--cream);padding:15px;border-radius:2px;font-size:14px;font-weight:600;}
  .checkout-btn:hover{background:var(--navy-deep);}

  .pd-overlay{position:fixed;inset:0;background:rgba(13,21,38,0.55);display:none;z-index:110;align-items:center;justify-content:center;padding:24px;}
  .pd-overlay.open{display:flex;}
  .pd-modal{background:var(--cream);max-width:760px;width:100%;border-radius:6px;overflow:hidden;display:grid;grid-template-columns:1fr 1fr;max-height:88vh;}
  .pd-image{aspect-ratio:4/5;}
  .pd-body{padding:34px;overflow-y:auto;}
  .pd-close{position:absolute;top:16px;right:16px;font-size:22px;color:#fff;background:rgba(0,0,0,0.2);width:32px;height:32px;border-radius:50%;}
  .pd-name{font-size:24px;margin-bottom:6px;}
  .pd-price{font-size:17px;color:#5B6478;margin-bottom:16px;}
  .pd-desc{font-size:14px;line-height:1.6;color:#3B4763;margin-bottom:20px;}
  .size-label{font-size:13px;font-weight:600;margin-bottom:8px;}
  .size-row{display:flex;gap:8px;margin-bottom:22px;}
  .size-opt{border:1.5px solid var(--line);padding:8px 14px;border-radius:2px;font-size:13px;font-weight:600;}
  .size-opt.selected{border-color:var(--navy);background:var(--navy);color:var(--cream);}
  .add-btn{width:100%;background:var(--navy);color:var(--cream);padding:15px;border-radius:2px;font-size:14px;font-weight:600;}
  .add-btn:hover{background:var(--navy-deep);}
  .added-toast{font-size:13px;color:var(--gold);margin-top:10px;font-weight:600;display:none;}
  .added-toast.show{display:block;}

  @media (max-width:760px){
    .grid{grid-template-columns:repeat(2,1fr);}
    .pd-modal{grid-template-columns:1fr;}
    .pd-image{aspect-ratio:16/9;}
  }
</style>
</head>
<body>

<div class="announce">Buy 2 Polos, Get $20 Off + Free Shipping</div>
<header>
  <div class="navbar">
    <div class="logo">AM<span>&middot;</span>GOLF</div>
    <button class="cart-btn" onclick="openCart()">
      Cart
      <span class="cart-count" id="cartCount">0</span>
    </button>
  </div>
</header>

<div class="wrap">
  <div class="hero">
    <h1>New Arrivals</h1>
    <p>Click any polo to view details, pick a size, and add it to your cart.</p>
  </div>
  <div class="grid" id="productGrid"></div>
</div>

<div class="overlay" id="cartOverlay" onclick="closeCart()"></div>
<div class="drawer" id="cartDrawer">
  <div class="drawer-head">
    <h2>Your Cart</h2>
    <button class="close-btn" onclick="closeCart()">&times;</button>
  </div>
  <div class="drawer-items" id="cartItems"></div>
  <div class="drawer-foot" id="cartFoot" style="display:none;">
    <div class="subtotal-row"><span>Subtotal</span><span id="subtotal">$0</span></div>
    <button class="checkout-btn" onclick="checkout()">Checkout</button>
  </div>
</div>

<div class="pd-overlay" id="pdOverlay" onclick="if(event.target===this)closePD()">
  <div class="pd-modal" style="position:relative;">
    <button class="pd-close" onclick="closePD()">&times;</button>
    <div class="pd-image" id="pdImage"></div>
    <div class="pd-body">
      <h2 class="pd-name" id="pdName"></h2>
      <div class="pd-price" id="pdPrice"></div>
      <div class="pd-desc" id="pdDesc"></div>
      <div class="size-label">Size</div>
      <div class="size-row" id="pdSizes"></div>
      <button class="add-btn" id="pdAddBtn">Add to Cart</button>
      <div class="added-toast" id="pdToast">Added to cart ✓</div>
    </div>
  </div>
</div>

<script>
const products = [
  {id:1, name:'Sunrise', price:74, cls:'p1', desc:"Named for the exact minute the sky turns gold. Cut from AM Flow™ fabric — lightweight, breathable, built to move through 18 holes."},
  {id:2, name:'Fog Line', price:74, cls:'p2', desc:"Cool tones inspired by morning mist on the fairway. Built for the golfer who plays before the course fills up."},
  {id:3, name:'Dew Point', price:74, cls:'p3', desc:"Named for the dew still on the green at your 6am tee time. Earthy tones inspired by the course at first light."},
  {id:4, name:'Night Owl', price:74, cls:'p4', desc:"For the golfer who closes the course instead of opening it. Proof that AM Golf isn't just about mornings."},
  {id:5, name:'Coastal Bloom', price:74, cls:'p5', desc:"Vacation energy for your home course. A bold floral built for warm rounds and long weekends."},
  {id:6, name:'Old Fashioned', price:74, cls:'p6', desc:"A clean, classic stripe for the traditionalist. Old-money style with new-school performance."},
  {id:7, name:'Caddy Navy', price:74, cls:'p7', desc:"The one polo everyone needs in the bag. Classic navy, zero fuss, all performance."},
  {id:8, name:'Solid Sunup', price:74, cls:'p8', desc:"Sometimes simple wins. A clean solid in AM Flow™ fabric for the golfer who wants performance without the print."}
];
const sizes = ['S','M','L','XL'];
let cart = [];
let currentProduct = null;
let selectedSize = null;

function renderGrid(){
  const grid = document.getElementById('productGrid');
  grid.innerHTML = products.map(p => `
    <button class="card" onclick="openPD(${p.id})">
      <div class="swatch ${p.cls}">${p.name}</div>
      <div class="pname">AM Golf — ${p.name}</div>
      <div class="pprice">$${p.price}</div>
    </button>
  `).join('');
}

function openPD(id){
  currentProduct = products.find(p => p.id === id);
  selectedSize = null;
  document.getElementById('pdImage').className = 'pd-image ' + currentProduct.cls;
  document.getElementById('pdName').textContent = 'AM Golf — ' + currentProduct.name;
  document.getElementById('pdPrice').textContent = '$' + currentProduct.price;
  document.getElementById('pdDesc').textContent = currentProduct.desc;
  document.getElementById('pdSizes').innerHTML = sizes.map(s =>
    `<button class="size-opt" onclick="selectSize('${s}', this)">${s}</button>`
  ).join('');
  document.getElementById('pdToast').classList.remove('show');
  document.getElementById('pdAddBtn').onclick = addCurrentToCart;
  document.getElementById('pdOverlay').classList.add('open');
}
function closePD(){ document.getElementById('pdOverlay').classList.remove('open'); }

function selectSize(size, el){
  selectedSize = size;
  document.querySelectorAll('.size-opt').forEach(b => b.classList.remove('selected'));
  el.classList.add('selected');
}

function addCurrentToCart(){
  if(!selectedSize){
    alert('Please select a size');
    return;
  }
  const key = currentProduct.id + '-' + selectedSize;
  const existing = cart.find(c => c.key === key);
  if(existing){
    existing.qty += 1;
  } else {
    cart.push({key, id: currentProduct.id, name: currentProduct.name, price: currentProduct.price, cls: currentProduct.cls, size: selectedSize, qty: 1});
  }
  renderCart();
  const toast = document.getElementById('pdToast');
  toast.classList.add('show');
  setTimeout(() => { toast.classList.remove('show'); }, 1800);
}

function renderCart(){
  const itemsEl = document.getElementById('cartItems');
  const footEl = document.getElementById('cartFoot');
  const countEl = document.getElementById('cartCount');
  const totalQty = cart.reduce((sum,c) => sum + c.qty, 0);
  countEl.textContent = totalQty;

  if(cart.length === 0){
    itemsEl.innerHTML = '<div class="empty-cart">Your cart is empty.<br>Click a product to add one.</div>';
    footEl.style.display = 'none';
    return;
  }

  itemsEl.innerHTML = cart.map(c => `
    <div class="cart-row">
      <div class="cart-thumb ${c.cls}"></div>
      <div class="cart-row-info">
        <div class="cart-row-name">AM Golf — ${c.name}</div>
        <div class="cart-row-meta">Size ${c.size}</div>
        <div class="qty-controls">
          <button class="qty-btn" onclick="changeQty('${c.key}', -1)">-</button>
          <span>${c.qty}</span>
          <button class="qty-btn" onclick="changeQty('${c.key}', 1)">+</button>
        </div>
        <span class="remove-btn" onclick="removeItem('${c.key}')">Remove</span>
      </div>
      <div class="cart-row-price">$${c.price * c.qty}</div>
    </div>
  `).join('');

  footEl.style.display = 'block';
  const subtotal = cart.reduce((sum,c) => sum + c.price * c.qty, 0);
  document.getElementById('subtotal').textContent = '$' + subtotal;
}

function changeQty(key, delta){
  const item = cart.find(c => c.key === key);
  item.qty += delta;
  if(item.qty <= 0) cart = cart.filter(c => c.key !== key);
  renderCart();
}
function removeItem(key){
  cart = cart.filter(c => c.key !== key);
  renderCart();
}

function openCart(){
  document.getElementById('cartDrawer').classList.add('open');
  document.getElementById('cartOverlay').classList.add('open');
}
function closeCart(){
  document.getElementById('cartDrawer').classList.remove('open');
  document.getElementById('cartOverlay').classList.remove('open');
}
function checkout(){
  alert('This is a demo — in your real Shopify store this button sends customers to Shopify Checkout.');
}

renderGrid();
renderCart();
</script>
</body>
</html>
